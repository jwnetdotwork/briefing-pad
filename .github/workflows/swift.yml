name: BriefingPad CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show Xcode and SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build for testing
        run: >
          xcodebuild build-for-testing
          -project BriefingPad.xcodeproj
          -scheme BriefingPad
          -destination 'platform=macOS,arch=arm64'
          -derivedDataPath "${{ runner.temp }}/DerivedDataBriefingPad"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Test without building
        timeout-minutes: 8
        run: >
          xcodebuild test-without-building
          -project BriefingPad.xcodeproj
          -scheme BriefingPad
          -destination 'platform=macOS,arch=arm64'
          -derivedDataPath "${{ runner.temp }}/DerivedDataBriefingPad"
          -skip-testing:BriefingPadUITests
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
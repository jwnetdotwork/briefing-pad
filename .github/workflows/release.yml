name: BriefingPad Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 20

    env:
      PROJECT: BriefingPad.xcodeproj
      SCHEME: BriefingPad
      CONFIGURATION: Release
      APP_NAME: BriefingPad
      VOLUME_NAME: Briefing Pad

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedDataBriefingPad
        run: >
          xcodebuild build
          -project "$PROJECT"
          -scheme "$SCHEME"
          -configuration "$CONFIGURATION"
          -destination 'platform=macOS,arch=arm64'
          -derivedDataPath "$DERIVED_DATA"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Ad-hoc sign
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedDataBriefingPad
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$APP_NAME.app"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package
        env:
          DERIVED_DATA: ${{ runner.temp }}/DerivedDataBriefingPad
          RELEASE_DIR: ${{ runner.temp }}/BriefingPadRelease
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$APP_NAME.app"
          mkdir -p "$RELEASE_DIR/dmg-root"
          ditto "$APP_PATH" "$RELEASE_DIR/dmg-root/$APP_NAME.app"
          ln -s /Applications "$RELEASE_DIR/dmg-root/Applications"

          cd "$DERIVED_DATA/Build/Products/$CONFIGURATION"
          ditto -c -k --keepParent "$APP_NAME.app" "$RELEASE_DIR/$APP_NAME-${GITHUB_REF_NAME}.zip"

          hdiutil create \
            -volname "$VOLUME_NAME" \
            -srcfolder "$RELEASE_DIR/dmg-root" \
            -ov \
            -format UDZO \
            "$RELEASE_DIR/$APP_NAME-${GITHUB_REF_NAME}.dmg"

      - name: Create GitHub Release
        env:
          RELEASE_DIR: ${{ runner.temp }}/BriefingPadRelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BriefingPad ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.RELEASE_DIR }}/${{ env.APP_NAME }}-${{ github.ref_name }}.zip
            ${{ env.RELEASE_DIR }}/${{ env.APP_NAME }}-${{ github.ref_name }}.dmg
